name: 165 數據抓取並同步至 Google Sheet

on:
  schedule:
    # 每天台灣時間下午 15:10 自動跑 (對應 UTC 時間 07:10)
    - cron: '10 7 * * *'
  workflow_dispatch: # 允許手動點按鈕測試

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: 複製專案程式碼
      uses: actions/checkout@v3

    - name: 設定 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝套件
      run: pip install requests

    - name: 執行爬蟲並外送到 Google Sheet
      run: python scraper.py
